name: wf-ci-staging

on:
  pull_request:
    branches:
      - "release/**"
      - "release"

jobs:
  ci-staging-job:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      # - name: Install Dependencies
      #   run: npm ci

      - name: Lint HTML and CSS
        run: |
          npx htmlhint "**/*.html"
          npx stylelint "**/*.css"

      - name: Test Build in Staging
        run: |
          npx parcel build "./src/index.html" --dist-dir "./dist" --public-url "./"
