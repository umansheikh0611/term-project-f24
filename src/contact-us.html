<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Apple</title>
    <link rel="stylesheet" href="../styles/contact-us.css">
</head>
<body>
    <div class="container">
        <h1>Contact Apple</h1>
        <img src="https://1000logos.net/wp-content/uploads/2016/10/Apple-Logo.png" alt="Apple Office">
        <div class="contact-info">
            <p><strong>Address:</strong> 1 Apple Park Way, Cupertino, CA 95014, USA</p>
            <p><strong>Phone:</strong> +1 (800) MY-APPLE</p>
            <p><strong>Email:</strong> support@apple.com</p>
        </div>
        <div class="contact-form">
            <h2>Get in Touch</h2>
            <form>
                <label for="name">Name:</label>
                <input type="text" id="name" name="name" required>
                
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>
                
                <label for="message">Message:</label>
                <textarea id="message" name="message" rows="5" required></textarea>
                
                <button type="submit">Send Message</button>
            </form>
        </div>
    </div>
</body>
</html>
